name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:

concurrency:
  group: backend-production
  cancel-in-progress: false

env:
  PYTHONPATH: backend

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci_eventhub.db
      SECRET_KEY: ci-secret-key
      ALGORITHM: HS256
      ACS_CONNECTION_STRING: endpoint=https://test.communication.azure.com/;accesskey=dGVzdA==
      SENDER_EMAIL: DoNotReply@test.com
      ALLOWED_ORIGINS: "*"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v

  build-smoke-push:
    name: Build, Smoke Test, Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner and image name
        id: vars
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$OWNER/eventhub-api
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.vars.outputs.image }}:${{ github.sha }} .

      - name: Run container smoke test
        run: |
          docker run -d --name eventhub-smoke \
            -p 8000:8000 \
            -e SECRET_KEY=ci-secret-key \
            -e ALGORITHM=HS256 \
            -e DATABASE_URL=sqlite:///./smoke.db \
            -e ACS_CONNECTION_STRING="endpoint=https://test.communication.azure.com/;accesskey=dGVzdA==" \
            -e SENDER_EMAIL=DoNotReply@test.com \
            -e ALLOWED_ORIGINS="*" \
            ${{ steps.vars.outputs.image }}:${{ github.sha }}
          sleep 10
          curl --fail --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8000/docs
          docker stop eventhub-smoke
          docker rm eventhub-smoke

      - name: Push Docker image
        run: |
          docker push ${{ steps.vars.outputs.image }}:${{ github.sha }}
          docker tag ${{ steps.vars.outputs.image }}:${{ github.sha }} ${{ steps.vars.outputs.image }}:latest
          docker push ${{ steps.vars.outputs.image }}:latest

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build-smoke-push
    steps:
      - name: Set lowercase owner and image name
        id: vars
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$OWNER/eventhub-api
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # Deploy container to Azure Web App using your Publish Profile
      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ steps.vars.outputs.image }}:${{ github.sha }}
