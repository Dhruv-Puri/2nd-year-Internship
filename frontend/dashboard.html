<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    

</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo"><i class="fas fa-calendar-check"></i> EventHub</div>
        <div class="user-info">
            <div class="user-role" id="current-role-label">LOADING...</div>
            <div class="user-name" id="user-name">...</div>
            <div class="user-email" id="user-email">...</div>
        </div>
        <nav id="sidebar-nav">
            <!-- THEME SELECTOR HTML -->
            <button class="theme-selector" id="themeSelectorBtn">
                <i class="fas fa-palette"></i> Themes
            </button>
            <div class="theme-options" id="themeOptions">
                <button class="theme-option active" data-theme="light">Minimalist Light</button>
                <button class="theme-option" data-theme="dark">Deep Slate Dark</button>
                <button class="theme-option" data-theme="ocean">Ocean Blue</button>
                <button class="theme-option" data-theme="forest">Forest Green</button>
                <button class="theme-option" data-theme="sunset">Sunset Orange</button>
            </div>       


            <!-- Added ID to hide for Admin -->
            <div class="nav-item" id="nav-chatbot" onclick="openOverlay('chatbot')"><i class="fas fa-robot"></i> Ask EventBot</div>
            <div class="nav-item" id="nav-publish" style="display:none;" onclick="openOverlay('publish')"><i class="fas fa-plus-circle"></i> Publish Event</div>
            <div class="nav-item" id="nav-attendance" style="display:none;" onclick="openOverlay('attendance')"><i class="fas fa-clipboard-check"></i> Manage Attendance</div>
            <div class="nav-item" id="nav-reports" style="display:none;" onclick="openOverlay('reports')"><i class="fas fa-chart-line"></i> Analytics</div>
            <div class="nav-item" id="nav-announcement" style="display:none;" onclick="openOverlay('announcement')"><i class="fas fa-bullhorn"></i> Post Announcement</div>
            <div class="nav-item" id="nav-club-manager" style="display:none;" onclick="openOverlay('club-manager')"><i class="fas fa-users-cog"></i> Manage Clubs</div>
        </nav>
        <div class="nav-item logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Log Out</div>
    </aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Top Bar -->
        <header class="top-bar">
            <div style="display: flex; align-items: center; flex: 1;">
                <i class="fas fa-bars toggle-btn" onclick="toggleSidebar()"></i>
                <div id="search-bar-container" style="align-items: center; gap: 0.5rem;">
                    <div class="search-bar">
                       <i class="fas fa-search" style="color: var(--muted);"></i>
                       <input type="text" id="search-input" placeholder="Search events...">
                    </div>
                    <button class="btn btn-sm" onclick="performSearch()" style="margin: 0; white-space: nowrap;">Search</button>
                </div>
            </div>
            
            <div class="header-actions">
                <div class="icon-btn" onclick="openOverlay('notifications')">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notif-badge" style="display:none;">0</span>
                </div>
                <!-- Added ID to hide for Admin -->
                <div class="icon-btn" id="top-chatbot" onclick="openOverlay('chatbot')">
                    <i class="fas fa-comment-dots"></i>
                </div>
            </div>
        </header>

        <!-- Dashboard Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 id="page-title">Dashboard</h1>
                <p id="page-subtitle">Welcome back! Here's what's happening today.</p>
            </div>
            <div id="dashboard-grid" class="grid"></div>
        </main>
    </div>

    <!-- Universal Overlay Container -->
    <div id="universal-overlay" class="overlay" onclick="closeOverlay()">
        <div class="overlay-modal" id="overlay-modal" onclick="event.stopPropagation()">
            <div class="overlay-header">
                <h2 id="overlay-title">Title</h2>
                <button class="close-btn" onclick="closeOverlay()">&times;</button>
            </div>
            <div class="overlay-body" id="overlay-body"></div>
        </div>
    </div>
</body>
<script src="dashboard.js"></script>
</html>
