<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">       
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>

    <div class="auth-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'login')">Log In</button>
            <button class="tab-btn" onclick="switchTab(event, 'signup')">Sign Up</button>
            <div class="indicator" id="tab-indicator"></div>
        </div>

        <form id="login-form" class="form-view active" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn" onclick="loginUser()">Sign In</button>
            <a href="#" class="alt-action">Forgot your password?</a>
        </form>

        <form id="signup-form" class="form-view" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="signup-role">Role</label>
                <input type="text" id="signup-role" list = "Role-options" placeholder="Eg. Student" required>
                <datalist id="Role-options">
                    <option value="Student">
                    <option value="Club Manager">
                    <option value="Admin">
                </datalist>

            </div>
            <div class="input-group">
                <label for="signup-email">Email Address</label>
                <input type="email" id="signup-email" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
                <label for="signup-password">Create Password</label>
                <input type="password" id="signup-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn" onclick = "registerUser()">Create Account</button>
        </form>
    </div>

    <script>

    //--------------------------------------------------------   
    //---------------- Animation and Selection----------------  
    //--------------------------------------------------------   
        // Set the initial position of the slider when the page loads
        window.addEventListener('DOMContentLoaded', () => {
            const activeBtn = document.querySelector('.tab-btn.active');
            updateIndicator(activeBtn);
        });

        function switchTab(event, tabId) {
            // Remove active classes
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-view').forEach(form => form.classList.remove('active'));

            // Add active class to clicked button
            event.target.classList.add('active');

            // Show the corresponding form
            document.getElementById(tabId + '-form').classList.add('active');

            // Slide the indicator to the clicked button
            updateIndicator(event.target);
        }

        function updateIndicator(element) {
            const indicator = document.getElementById('tab-indicator');
            // Match the width and position of the active button
            indicator.style.width = element.offsetWidth + 'px';
            indicator.style.left = element.offsetLeft + 'px';
        }
        


    //--------------------------------------------------------   
    //---------------- Authentication Logic-------------------  
    //--------------------------------------------------------   
    const API_URL = "http://127.0.0.1:8000";
    const TOKEN = {}

    async function registerUser(){
        const url = `${API_URL}/api/auth/register`;
        
        // 1. Get the values and trim invisible spaces
        const emailValue = document.getElementById("signup-email").value.trim();
        const passwordValue = document.getElementById("signup-password").value.trim();
        const roleValue = document.getElementById("signup-role").value.trim();
        
        if(emailValue != '' && passwordValue != '' && roleValue != ''){
            try {
                const credentials = {
                    email: emailValue,       
                    password: passwordValue,
                    role: roleValue          
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(credentials)
                });

                if (!response.ok) {
                    // If the error is internal server error 500, it is most likely due to having conflicting primary key as the sqlalchemy wasn't able to add the data to the database 
                    if (response.status === 500) {
                        throw new Error("User Already Exists.");
                    }
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const result = await response.json();
                console.log('Registered Successfully:', result);
                alert('Account created successfully! Please log in.');
                
                // --- UI CLEANUP ---
                // 1. Clear the signup form fields
                document.getElementById("signup-form").reset();
                // 2. Automatically switch the UI back to the login tab
                switchTab({target: document.querySelector('.tab-btn')}, 'login');
                
                return result;

            } catch (error) {
                alert('Registration failed: ' + error);
            }
        } else {
            alert('Please Enter All the Details.');
        }
    }

    async function loginUser() {
        const url = `${API_URL}/api/auth/login`;
        
        // 1. Get the values and trim invisible spaces
        const emailValue = document.getElementById("login-email").value.trim();
        const passwordValue = document.getElementById("login-password").value.trim();

        if(emailValue != '' && passwordValue != ''){
            try {
                const formData = new URLSearchParams();
                formData.append("username", emailValue); 
                formData.append("password", passwordValue);

                const response = await fetch(url, {
                    method: 'POST',
                    // REMOVED the manual headers object entirely! 
                    // Fetch will automatically set the correct Form-Data headers for URLSearchParams.
                    body: formData 
                });

                if (!response.ok) {
                    // If it's a 400 error, it's likely bad credentials
                    if (response.status === 400) {
                        throw new Error("Incorrect email or password.");
                    }
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const result = await response.json();
                console.log('LoggedIn Successfully:', result);
                alert('Logged in successfully!');
                
                // Optional: Clear the login form after success
                document.getElementById("login-form").reset();
                

                // saving the jwt token in session storage 
                localStorage.setItem("token",result.access_token);

                // redirecting the user to dashboard.html
                window.location.replace("dashboard.html");




                // console.log(result);
                return result;


            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        } 
        else {
            alert('Please Enter Details First');
        }
    }
                
            
        </script>

</body>
</html>
