 <!-- add Themes  -->

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- THEME SELECTOR HTML -->
    <button class="theme-selector" id="themeSelectorBtn">
        <i class="fas fa-palette"></i> Themes
    </button>
    <div class="theme-options" id="themeOptions">
        <button class="theme-option active" data-theme="light">Minimalist Light</button>
        <button class="theme-option" data-theme="dark" style="filter: invert(100%);">Deep Slate Dark</button>
        <button class="theme-option" data-theme="ocean">Ocean Blue</button>
        <button class="theme-option" data-theme="forest">Forest Green</button>
        <button class="theme-option" data-theme="sunset">Sunset Orange</button>
    </div>

    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-layer-group"></i>
                <span>EventHub</span>
            </div>
            <p class="subtitle">LPU's Official Club Event Manager</p>
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" data-tab="signup" onclick="switchTab('signup')">Sign Up</button>
                <span class="indicator"></span>
            </div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="form-view active" onsubmit="handleLogin(event)">
            <!-- Specific Error Container for Login -->
            <div id="login-error-message" class="error-msg"></div>
            
            <div class="input-group">
                <label for="login-email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="login-email" placeholder="you@lpu.co.in" required>
                </div>
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
            </div>
            <a href="#" class="alt-action forgot-pass">Forgot password?</a>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="form-view" onsubmit="handleSignup(event)">
            <!-- Specific Error Container for Signup -->
            <div id="signup-error-message" class="error-msg"></div>

            <div class="input-group">
                <label for="signup-role">Account Role</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-tag input-icon"></i>
                    <select id="signup-role" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="student">Student</option>
                        <option value="admin">Club Admin</option>
                        <option value="coordinator">Student Affairs Coordinator</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label for="signup-name">Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="signup-name" placeholder="Alex Student" required>
                </div>
            </div>
            <div class="input-group">
                <label for="signup-email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="signup-email" placeholder="you@lpu.co.in" required>
                </div>
            </div>
            <div class="input-group">
                <label for="signup-password">Create Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="signup-password" placeholder="Min 6 characters" required>
                </div>
            </div>
            <button type="submit" class="submit-btn">Create Account</button>
        </form>
    </div>

    <script>
        /* ---------------------------------------------------------
           FRONTEND UI LOGIC 
        --------------------------------------------------------- */
        const API_URL = "http://127.0.0.1:8000";

        const themeSelectorBtn = document.getElementById('themeSelectorBtn');
        const themeOptions = document.getElementById('themeOptions');
        const options = document.querySelectorAll('.theme-option');

        // Load saved theme on page load
        const savedTheme = localStorage.getItem('eventhub-theme') || 'light';
        if (savedTheme !== 'light') {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        updateActiveOption(savedTheme);

        // Toggle dropdown visibility
        themeSelectorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            themeOptions.classList.toggle('active');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
            themeOptions.classList.remove('active');
        });

        // Prevent dropdown from closing when clicking inside it
        themeOptions.addEventListener('click', (e) => e.stopPropagation());

        // Handle theme selection
        options.forEach(option => {
            option.addEventListener('click', () => {
                const theme = option.getAttribute('data-theme');
                if (theme === 'light') {
                    document.documentElement.removeAttribute('data-theme');
                } else {
                    document.documentElement.setAttribute('data-theme', theme);
                }
                localStorage.setItem('eventhub-theme', theme);
                updateActiveOption(theme);
                themeOptions.classList.remove('active');
            });
        });

        function updateActiveOption(currentTheme) {
            options.forEach(opt => {
                if (opt.getAttribute('data-theme') === currentTheme) {
                    opt.classList.add('active');
                } else {
                    opt.classList.remove('active');
                }
            });
        }

        // Redirect if already logged in
        if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

        // Form Submission Wrappers
        function handleLogin(event) {
            event.preventDefault();
            login();
        }

        function handleSignup(event) {
            event.preventDefault();
            signup();
        }

        // Tab Switching & Indicator Animation
        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.tab-btn');
            const forms = document.querySelectorAll('.form-view');
            const indicator = document.querySelector('.indicator');
            
            // Clear errors via text content (relies on CSS :not(:empty))
            document.querySelectorAll('.error-msg').forEach(el => el.textContent = '');

            tabs.forEach(tab => {
                if (tab.dataset.tab === tabName) {
                    tab.classList.add('active');
                    indicator.style.width = `${tab.offsetWidth}px`;
                    indicator.style.left = `${tab.offsetLeft}px`;
                } else {
                    tab.classList.remove('active');
                }
            });

            forms.forEach(form => {
                form.classList.toggle('active', form.id === `${tabName}-form`);
            });
        }

        // Initialize Indicator Position on Load & Resize
        const updateIndicator = () => {
            const activeTab = document.querySelector('.tab-btn.active');
            const indicator = document.querySelector('.indicator');
            if(activeTab && indicator) {
                indicator.style.width = `${activeTab.offsetWidth}px`;
                indicator.style.left = `${activeTab.offsetLeft}px`;
            }
        };
        
        window.addEventListener('load', updateIndicator);
        window.addEventListener('resize', updateIndicator);

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('signup-form').addEventListener('input', () => {
                document.getElementById('signup-error-message').textContent = '';
            });
            document.getElementById('login-form').addEventListener('input', () => {
                document.getElementById('login-error-message').textContent = '';
            });
        });

        function showError(elementId, message) {
            document.getElementById(elementId).textContent = message;
        }

        /* ---------------------------------------------------------
           BACKEND LOGIC  
        --------------------------------------------------------- */
        
        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            
            if (!email || !password) return showError('login-error-message', 'Please enter your email and password.');

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = 'dashboard.html';
                } else {
                    showError('login-error-message', data.detail || "Incorrect email or password.");
                }
            } catch (error) {
                showError('login-error-message', 'Unable to connect to the backend server.');
            }
        }

        async function signup() {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value.trim();
            const role = document.getElementById('signup-role').value.trim();
            
            if (!name || !email || !password || !role) return showError('signup-error-message', 'Please enter all the details.');
            if (password.length < 6) return showError('signup-error-message', 'Password must be at least 6 characters.');

            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, email, password, role })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = 'dashboard.html';
                } else {
                    showError('signup-error-message', data.detail || "Signup failed.");
                }
            } catch (error) {
                showError('signup-error-message', 'Unable to connect to the backend server.');
            }
        }
    </script>
</body>
</html>
