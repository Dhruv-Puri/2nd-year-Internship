 <!-- add Themes  -->

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
</head>
<body>
    <!-- EMAIL TOGGLE -->
    <div class="email-toggle-container">
        <span class="toggle-label">Send Emails</span>
        <label class="switch">
            <input type="checkbox" id="emailToggleBtn">
            <span class="slider round"></span>
        </label>
    </div>
    <!-- THEME SELECTOR HTML -->
    <button class="theme-selector" id="themeSelectorBtn">
        <i class="fas fa-palette"></i> Themes
    </button>
    <div class="theme-options" id="themeOptions">
        <button class="theme-option active" data-theme="light">Minimalist Light</button>
        <button class="theme-option" data-theme="dark" style="filter: invert(100%);">Deep Slate Dark</button>
        <button class="theme-option" data-theme="ocean">Ocean Blue</button>
        <button class="theme-option" data-theme="forest">Forest Green</button>
        <button class="theme-option" data-theme="sunset">Sunset Orange</button>
    </div>

    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-layer-group"></i>
                <span>EventHub</span>
            </div>
            <p class="subtitle">LPU's Official Club Event Manager</p>
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" data-tab="signup" onclick="switchTab('signup')">Sign Up</button>
                <span class="indicator"></span>
            </div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="form-view active" onsubmit="handleLogin(event)">
            <!-- Specific Error Container for Login -->
            <div id="login-error-message" class="error-msg"></div>
            
            <div class="input-group">
                <label for="login-email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="login-email" placeholder="you@lpu.co.in" required>
                </div>
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
            </div>
            <a href="#" class="alt-action forgot-pass">Forgot password?</a>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="form-view" onsubmit="handleSignup(event)">
            <!-- Specific Error Container for Signup -->
            <div id="signup-error-message" class="error-msg"></div>

            <div class="input-group">
                <label for="signup-role">Account Role</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-tag input-icon"></i>
                    <select id="signup-role" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="student">Student</option>
                        <option value="admin">Club Admin</option>
                        <option value="coordinator">Student Affairs Coordinator</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label for="signup-name">Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="signup-name" placeholder="Alex Student" required>
                </div>
            </div>
            <div class="input-group">
                <label for="signup-email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="signup-email" placeholder="you@lpu.co.in" required>
                </div>
            </div>
            <div class="input-group">
                <label for="signup-password">Create Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="signup-password" placeholder="Min 6 characters" required>
                </div>
            </div>
            <button type="submit" class="submit-btn">Create Account</button>
        </form>
    </div>

    <!-- Forgot Password Overlay -->
    <div id="forgot-overlay" class="otp-overlay hidden">
        <div class="otp-modal">
            <h2 id="forgot-title">Reset Password</h2>
            <p class="subtitle" id="forgot-subtitle">Enter your email to receive a reset code.</p>
            
            <div id="forgot-error-message" class="error-msg"></div>
            
            <!-- Step 1: Email -->
            <div id="forgot-step1">
                <div class="input-group" style="text-align: left;">
                    <label for="forgot-email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="forgot-email" placeholder="you@lpu.co.in" required>
                    </div>
                </div>
                <button type="button" class="submit-btn" onclick="sendForgotOtp()">Send OTP</button>
            </div>

            <!-- Step 2: OTP & New Password -->
            <div id="forgot-step2" style="display: none;">
                <div class="input-group" style="text-align: left;">
                    <label for="forgot-otp">Enter OTP</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key input-icon"></i>
                        <input type="text" id="forgot-otp" placeholder="123456" maxlength="6" required>
                    </div>
                </div>
                <div class="input-group" style="text-align: left;">
                    <label for="forgot-new-password">New Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="forgot-new-password" placeholder="Min 6 characters" required>
                    </div>
                </div>
                <button type="button" class="submit-btn" onclick="resetPassword()">Reset Password</button>
            </div>

            <button type="button" class="alt-action" style="text-align: center; margin-top: 16px; display: block; cursor: pointer; background: none; border: none; font-family: inherit;" onclick="closeForgotOverlay()">Cancel</button>
        </div>
    </div>

    <!-- OTP Verification Overlay -->
    <div id="otp-overlay" class="otp-overlay hidden">
        <div class="otp-modal">
            <h2>Verify Your Email</h2>
            <p class="subtitle">We've sent a 6-digit OTP to your email address.</p>
            
            <!-- Specific Error Container for OTP -->
            <div id="otp-error-message" class="error-msg"></div>
            
            <div class="input-group" style="text-align: left;">
                <label for="otp-input">Enter OTP</label>
                <div class="input-wrapper">
                    <i class="fas fa-key input-icon"></i>
                    <input type="text" id="otp-input" placeholder="123456" maxlength="6" required>
                </div>
            </div>
            <button type="button" class="submit-btn" onclick="verifyOtp()">Verify & Activate</button>
            <button type="button" class="alt-action" style="text-align: center; margin-top: 16px; display: block; cursor: pointer; background: none; border: none; font-family: inherit;" onclick="closeOtpOverlay()">Cancel</button>
        </div>
    </div>


    <script src="config.js"></script>
    <script src="index.js"></script>
</body>
</html>
